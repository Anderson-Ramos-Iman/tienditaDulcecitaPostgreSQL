<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiendita Dulcecita – Admin Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon"><i class="fa-solid fa-store"></i></div>
      <h1>Tiendita Dulcecita</h1>
      <p>Panel de Administración</p>
    </div>

    <div id="login-error" class="login-error hidden"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input id="email" type="email" class="form-control" placeholder="usuario@dominio.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <div style="position:relative">
          <input id="password" type="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required style="padding-right:42px">
          <button type="button" id="toggle-password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;line-height:1;display:flex;align-items:center">
            <i id="toggle-icon" class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px;padding:11px">
        <i class="fa-solid fa-right-to-bracket"></i> Ingresar
      </button>
    </form>

    <p style="text-align:center;margin-top:18px;font-size:12px;color:var(--text-muted)">
      <a href="/home" style="color:var(--primary)">← Ver catálogo público</a>
    </p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  if (sessionStorage.getItem('token')) {
    window.location.replace('/admin');
  }

  document.getElementById('toggle-password').addEventListener('click', () => {
    const pwd  = document.getElementById('password');
    const icon = document.getElementById('toggle-icon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'fa-solid fa-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'fa-solid fa-eye';
    }
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    const errEl = document.getElementById('login-error');
    errEl.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Ingresando...';

    try {
      const res = await authAPI.login({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      sessionStorage.setItem('token', res.data.token);
      sessionStorage.setItem('user', JSON.stringify({ nombre: res.data.nombre, email: res.data.email, rol: res.data.rol }));
      window.location.replace('/admin');
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Ingresar';
    }
  });
</script>
</body>
</html>
