<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiendita Dulcecita – Catálogo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="home-header">
  <div class="home-logo">
    <div class="icon"><i class="fa-solid fa-store"></i></div>
    <span>Tiendita Dulcecita</span>
  </div>
  <a href="/login" class="btn btn-outline" style="color:#94a3b8;border-color:#334155">
    <i class="fa-solid fa-lock"></i> Admin
  </a>
</header>

<div class="home-search">
  <div class="search-box" style="max-width:480px;position:relative">
    <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
    <input id="search-input" type="text" class="form-control" placeholder="Buscar productos..." style="padding-left:38px;border-radius:99px;width:100%">
  </div>
</div>

<div style="padding:8px 24px 0;display:flex;align-items:center;justify-content:space-between">
  <p id="count-label" style="font-size:13px;color:var(--text-muted)">Cargando productos...</p>
  <button id="refresh-btn" class="btn btn-outline btn-sm">
    <i class="fa-solid fa-rotate-right"></i> Actualizar
  </button>
</div>

<div id="catalog" class="catalog-grid"></div>

<div id="catalog-empty" class="hidden" style="text-align:center;padding:60px 20px;color:var(--text-muted)">
  <i class="fa-solid fa-box-open" style="font-size:40px;margin-bottom:12px;display:block;opacity:.4"></i>
  <p style="font-size:15px">No se encontraron productos</p>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  let allProducts = [];

  function renderCatalog(list) {
    const grid = document.getElementById('catalog');
    const empty = document.getElementById('catalog-empty');
    const count = document.getElementById('count-label');

    const activos = list.filter(p => p.activo != 0);
    count.textContent = `${activos.length} producto${activos.length !== 1 ? 's' : ''} disponibles`;

    if (!activos.length) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    grid.innerHTML = activos.map(p => {
      const imgHtml = p.imagen_url
        ? `<img src="${p.imagen_url}" alt="${p.nombre}" onerror="this.parentElement.innerHTML='<i class=\\'fa-solid fa-image\\'></i>'">`
        : `<i class="fa-solid fa-box"></i>`;
      const stockBadge = p.stock <= 0
        ? `<span class="chip chip-danger" style="font-size:11px">Agotado</span>`
        : p.stock <= 5
          ? `<span class="chip chip-warning" style="font-size:11px">Stock: ${p.stock}</span>`
          : `<span class="chip chip-success" style="font-size:11px">Stock: ${p.stock}</span>`;
      return `
        <div class="catalog-card">
          <div class="img-area">${imgHtml}</div>
          <div class="card-body">
            <div class="card-name">${p.nombre}</div>
            <div class="card-price">S/ ${parseFloat(p.precio_base).toFixed(2)}</div>
            <div class="card-tipo">${p.tipo_venta === 'por_peso' ? 'Por peso / kg' : 'Por unidad'}</div>
            <div class="card-stock" style="margin-top:8px">${stockBadge}</div>
          </div>
        </div>`;
    }).join('');
  }

  async function loadProducts() {
    try {
      const res = await productosAPI.getAll();
      allProducts = res.data || [];
      renderCatalog(allProducts);
    } catch (err) {
      document.getElementById('count-label').textContent = 'Error cargando productos';
      console.error(err);
    }
  }

  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const q = e.target.value.trim().toLowerCase();
      const filtered = q ? allProducts.filter(p => p.nombre.toLowerCase().includes(q)) : allProducts;
      renderCatalog(filtered);
    }, 250);
  });

  document.getElementById('refresh-btn').addEventListener('click', loadProducts);

  loadProducts();
</script>
</body>
</html>
