<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiendita Dulcecita – Catálogo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="home-body">

<!-- TOPBAR -->
<header class="home-topbar">
  <div class="home-topbar-logo">
    <div class="logo-icon"><i class="fa-solid fa-store"></i></div>
    <span>La Tiendita Dulcecita</span>
  </div>
  <a href="/login" class="btn btn-primary btn-sm">
    <i class="fa-solid fa-right-to-bracket"></i> Ingresar
  </a>
</header>

<!-- HERO -->
<div class="home-hero">
  <h1 class="home-hero-title">Nuestros Productos</h1>
  <p class="home-hero-sub">Consulta nuestro catálogo y verifica disponibilidad de stock.</p>
  <div class="home-hero-search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="search-input" type="text" placeholder="Buscar producto..." autocomplete="off">
  </div>
</div>

<!-- CATALOG -->
<div class="home-catalog-wrap">
  <div class="home-catalog-bar">
    <span id="count-label" class="home-count-label">Cargando productos...</span>
    <button id="refresh-btn" class="btn btn-outline btn-sm">
      <i class="fa-solid fa-rotate-right"></i> Actualizar
    </button>
  </div>
  <div id="catalog" class="catalog-grid"></div>
  <div id="catalog-empty" class="hidden home-empty">
    <i class="fa-solid fa-box-open"></i>
    <p style="font-size:15px">No se encontraron productos</p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  let allProducts = [];

  function renderCatalog(list) {
    const grid = document.getElementById('catalog');
    const empty = document.getElementById('catalog-empty');
    const count = document.getElementById('count-label');

    const activos = list.filter(p => p.activo != 0);
    count.textContent = `${activos.length} producto${activos.length !== 1 ? 's' : ''} disponibles`;

    if (!activos.length) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    grid.innerHTML = activos.map(p => {
      const imgHtml = p.imagen_url
        ? `<img src="${p.imagen_url}" alt="${p.nombre}" onerror="this.parentElement.innerHTML='<i class=\\'fa-solid fa-image\\'></i>'">`
        : `<i class="fa-solid fa-box"></i>`;
      const stockBadge = p.stock <= 0
        ? `<span class="chip chip-danger" style="font-size:11px">Agotado</span>`
        : p.stock <= 5
          ? `<span class="chip chip-warning" style="font-size:11px">Stock: ${p.stock}</span>`
          : `<span class="chip chip-success" style="font-size:11px">Stock: ${p.stock}</span>`;
      return `
        <div class="catalog-card">
          <div class="img-area">${imgHtml}</div>
          <div class="card-body">
            <div class="card-name">${p.nombre}</div>
            <div class="card-price">S/ ${parseFloat(p.precio_base).toFixed(2)}</div>
            <div class="card-tipo">${p.tipo_venta === 'por_peso' ? 'Por peso / kg' : 'Por unidad'}</div>
            <div class="card-stock" style="margin-top:8px">${stockBadge}</div>
          </div>
        </div>`;
    }).join('');
  }

  async function loadProducts() {
    try {
      const res = await productosAPI.getAll();
      allProducts = res.data || [];
      renderCatalog(allProducts);
    } catch (err) {
      document.getElementById('count-label').textContent = 'Error cargando productos';
      console.error(err);
    }
  }

  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const q = e.target.value.trim().toLowerCase();
      const filtered = q ? allProducts.filter(p => p.nombre.toLowerCase().includes(q)) : allProducts;
      renderCatalog(filtered);
    }, 250);
  });

  document.getElementById('refresh-btn').addEventListener('click', loadProducts);

  loadProducts();
</script>
</body>
</html>
